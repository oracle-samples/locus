name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

# Default to read-only. Individual publishing jobs declare the scopes they
# actually need (id-token for PyPI trusted publishing in future; none of
# these jobs currently need contents: write).
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  HATCH_VERSION: "1.16.5"

jobs:
  # Releases are cut from tagged commits that already passed the full
  # `ci.yml` matrix (lint + tests on Python 3.11–3.14 + pre-commit + DCO).
  # Re-running a single-version `hatch run test` here was redundant, so
  # the release pipeline starts at `build`.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pkg-name: ${{ steps.check-version.outputs.pkg-name }}
      version: ${{ steps.check-version.outputs.version }}
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # actions/setup-python@v5
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Hatch
        run: pip install hatch==${{ env.HATCH_VERSION }}

      - name: Build project for distribution
        run: hatch build

      # actions/upload-artifact@v4
      - name: Upload build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: dist/

      - name: Check Version
        id: check-version
        run: |
          echo "pkg-name=locus-sdk" >> "$GITHUB_OUTPUT"
          echo "version=$(hatch version)" >> "$GITHUB_OUTPUT"

  test-pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: testpypi
      url: https://test.pypi.org/project/${{ needs.build.outputs.pkg-name }}/
    steps:
      # actions/download-artifact@v4
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/

      # actions/setup-python@v5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.x"

      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        # continue-on-error so a missing/invalid TestPyPI token does not
        # block the main PyPI publish; TestPyPI is best-effort smoke-test.
        continue-on-error: true
        run: |
          pip install twine
          twine upload -r testpypi dist/* --verbose

  pre-release-checks:
    needs:
      - build
      - test-pypi-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # actions/setup-python@v5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Import published package
        # Download the built artifacts and verify the package imports
        # correctly using the local wheel (no TestPyPI dependency).
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/
      - name: Verify package imports
        env:
          PKG_NAME: ${{ needs.build.outputs.pkg-name }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -eu
          # Install the wheel directly from the build artifacts.
          pip install dist/${PKG_NAME//-/_}-${VERSION}-py3-none-any.whl
          python -c "import locus; print(dir(locus))"
          # Step 2: resolve dependencies from PyPI only.
          pip install \
            --index-url https://pypi.org/simple/ \
            "$PKG_NAME==$VERSION"
          python -c "import locus; print(dir(locus))"

  publish:
    needs:
      - build
      - test-pypi-publish
      - pre-release-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/${{ needs.build.outputs.pkg-name }}
    steps:
      # actions/download-artifact@v4
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/

      # actions/setup-python@v5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.x"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*
