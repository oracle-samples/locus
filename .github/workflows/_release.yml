name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

# Default to read-only. Individual publishing jobs declare the scopes they
# actually need (id-token for PyPI trusted publishing in future; none of
# these jobs currently need contents: write).
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  HATCH_VERSION: "1.14.0"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # actions/setup-python@v5
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Hatch
        run: pip install hatch==${{ env.HATCH_VERSION }}

      - name: Run unit tests
        run: hatch run test

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pkg-name: ${{ steps.check-version.outputs.pkg-name }}
      version: ${{ steps.check-version.outputs.version }}
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # actions/setup-python@v5
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Hatch
        run: pip install hatch==${{ env.HATCH_VERSION }}

      - name: Build project for distribution
        run: hatch build

      # actions/upload-artifact@v4
      - name: Upload build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: dist/

      - name: Check Version
        id: check-version
        run: |
          echo "pkg-name=locus" >> "$GITHUB_OUTPUT"
          echo "version=$(hatch version)" >> "$GITHUB_OUTPUT"

  test-pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: testpypi
      url: https://test.pypi.org/project/${{ needs.build.outputs.pkg-name }}/
    steps:
      # actions/download-artifact@v4
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/

      # actions/setup-python@v5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.x"

      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload -r testpypi dist/* --verbose

  pre-release-checks:
    needs:
      - build
      - test-pypi-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # actions/setup-python@v5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Import published package
        # Fetch the freshly-published package from TestPyPI *without* its
        # dependencies (--no-deps), then resolve the dependency tree from
        # PyPI only. Using --extra-index-url on test.pypi.org lets pip pick
        # a higher-versioned squatted transitive dependency from the
        # open-registration TestPyPI sandbox (classic dependency confusion,
        # CWE-829 / CWE-494).
        env:
          PKG_NAME: ${{ needs.build.outputs.pkg-name }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -eu
          # Step 1: install the package itself from TestPyPI, no deps.
          install_from_testpypi() {
            pip install \
              --index-url https://test.pypi.org/simple/ \
              --no-deps \
              "$PKG_NAME==$VERSION"
          }
          install_from_testpypi || ( sleep 5 && install_from_testpypi )
          # Step 2: resolve dependencies from PyPI only.
          pip install \
            --index-url https://pypi.org/simple/ \
            "$PKG_NAME==$VERSION"
          python -c "import locus; print(dir(locus))"

  publish:
    needs:
      - build
      - test-pypi-publish
      - pre-release-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/${{ needs.build.outputs.pkg-name }}
    steps:
      # actions/download-artifact@v4
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/

      # actions/setup-python@v5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.x"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*
