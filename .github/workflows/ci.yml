name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/_lint.yml

  test:
    name: Test
    uses: ./.github/workflows/_test.yml

  precommit:
    name: Pre-commit
    uses: ./.github/workflows/_precommit.yml

  codespell:
    name: Codespell
    uses: ./.github/workflows/_codespell.yml

  # Verify commits are signed off (OCA compliance). Only runs on PRs.
  dco:
    name: DCO Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Check DCO
        # tisonkun/actions-dco@v1.1 — pin to SHA so a deleted/rewritten
        # tag can't silently change the action body.
        uses: tisonkun/actions-dco@f1024cd563550b5632e754df11b7d30b73be54a5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Aggregate gate. Branch-protection should require this single status
  # check rather than each individual one — that lets us add / remove
  # jobs without retouching protection rules. ``skipped`` is allowed
  # (DCO is skipped on push events).
  ci-success:
    name: CI Success
    needs: [lint, test, precommit, codespell, dco]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -eu
          echo "$NEEDS_JSON"
          if echo "$NEEDS_JSON" | grep -qE '"result":[[:space:]]*"(failure|cancelled)"'; then
            echo "::error::At least one required job failed or was cancelled."
            exit 1
          fi
          echo "All required jobs passed."
