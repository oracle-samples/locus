name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Minimal default permissions for the CI pipeline. Individual jobs can raise
# to the narrowest scope they actually need; reusable sub-workflows declare
# their own permissions blocks.
permissions:
  contents: read

# If another push to the same PR or branch happens while this workflow is
# still running, cancel the earlier run in favor of the next run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/_lint.yml

  test:
    name: Test
    uses: ./.github/workflows/_test.yml

  codespell:
    name: Codespell
    uses: ./.github/workflows/_codespell.yml
