name: workbench

on:
  push:
    branches: [main]
    paths:
      - "workbench/**"
      - "src/locus/**"
      - "examples/tutorial_*.py"
      - "pyproject.toml"
      - ".github/workflows/workbench.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/workbench

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # docker/setup-buildx-action@v3
      - uses: docker/setup-buildx-action@b5730b58a23bef9f92c3751d9f0a9c9d8b40de6

      # docker/login-action@v3
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        # docker/metadata-action@v5
        uses: docker/metadata-action@902fa8ec7d6ecbea8a9d4564945dc4f7b46c4e5d
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        # docker/build-push-action@v6
        uses: docker/build-push-action@471d1dc4e07e5cdedd2bdf5e2a0c82a5e8948f4a
        with:
          context: .
          file: workbench/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
