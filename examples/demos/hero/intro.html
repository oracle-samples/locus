<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Locus intro</title>
    <style>
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background: #FAFAF9;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI",
          system-ui, sans-serif;
        overflow: hidden;
        animation: bgfade 6s ease forwards;
      }
      @keyframes bgfade {
        0%   { background: #FAFAF9; }
        82%  { background: #FAFAF9; }
        100% { background: #0e0e10; }
      }
      .stage {
        width: 1500px; height: 800px;
        margin: 0 auto;
        display: flex; align-items: center; justify-content: center;
      }
      .logo {
        opacity: 0;
        animation: fade 6s ease forwards;
        text-align: center;
      }
      @keyframes fade {
        0%   { opacity: 0; transform: scale(0.96); }
        12%  { opacity: 1; transform: scale(1); }
        85%  { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(1.04); }
      }
      .mark { width: 140px; height: 140px; display: block; margin: 0 auto 32px; }
      h1 {
        margin: 0;
        font-size: 88px; font-weight: 700;
        color: #312D2A;
        letter-spacing: -0.025em;
      }
      .tag {
        margin-top: 22px;
        font-size: 14px; font-weight: 500;
        color: #78716C;
        letter-spacing: 0.20em;
      }
      .repo {
        margin-top: 44px;
        font-size: 13px;
        color: #A8A29E;
        letter-spacing: 0.04em;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
      }

      /* Oracle endorsement */
      .oracle-row {
        margin-top: 44px;
        display: inline-flex; align-items: center; gap: 16px;
        padding-top: 24px;
        border-top: 1px solid #E7E5E4;
      }
      .oracle-row .by {
        font-size: 12px; color: #A8A29E;
        letter-spacing: 0.18em; text-transform: uppercase;
      }
      .oracle-row svg.oraclewm {
        height: 28px; width: auto;
      }
    </style>
  </head>

  <body>

      <div class="logo">
        <!-- Exact colours from docs/img/logo.svg -->

          <rect x="20" y="20" width="60" height="60" rx="4"
                fill="none" stroke="#312D2A" stroke-width="3"
                transform="rotate(45 50 50)"/>
          <rect x="28" y="28" width="44" height="44" rx="3"
                fill="none" stroke="#C74634" stroke-width="3"
                transform="rotate(22.5 50 50)"/>
          <rect x="38" y="38" width="24" height="24" rx="2" fill="#C74634"/>
          <circle cx="50" cy="50" r="4" fill="#FAFAF9"/>
        </svg>
        <h1>locus</h1>
        <div class="tag">ORACLE GENERATIVE AI · MULTI-AGENT ORCHESTRATOR SDK</div>
        <div class="repo">github.com/oracle/locus  ·  examples/demos/trip_team/</div>
