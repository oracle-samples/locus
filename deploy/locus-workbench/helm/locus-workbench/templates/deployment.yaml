apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "locus-workbench.fullname" . }}
  labels:
    {{- include "locus-workbench.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "locus-workbench.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "locus-workbench.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "locus-workbench.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: workbench
        image: "{{ required "image.repository must be set (OCIR ref from `terraform output -raw ocir_image_ref`)" .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- with .Values.command }}
        command:
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.args }}
        args:
          {{- toYaml . | nindent 8 }}
        {{- end }}
        ports:
        # The Service targets 5173 directly. The other two ports are
        # internal-only (BFF + backend reach each other via localhost)
        # but we expose them so `kubectl port-forward` can hit any
        # tier directly for debugging.
        - name: web
          containerPort: 5173
          protocol: TCP
        - name: bff
          containerPort: 3101
          protocol: TCP
        - name: backend
          containerPort: 8100
          protocol: TCP
        {{- with .Values.env }}
        env:
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.envFromSecret.name }}
        envFrom:
        - secretRef:
            name: {{ .Values.envFromSecret.name }}
        {{- end }}
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
