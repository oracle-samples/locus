# Default values for locus-agent.
# Override with `helm install -f overrides.yaml`.

image:
  repository: ghcr.io/oracle-samples/locus-agent
  tag: latest
  pullPolicy: IfNotPresent

# Number of replicas. Bump for HA + horizontal scale; ensure the
# checkpointer (e.g., OCIBucketBackend) is shared so all replicas see
# the same threads.
replicaCount: 2

# AgentServer auth — set the bearer token via a Kubernetes Secret.
# When `existingSecret` is set, the chart references that secret name
# and `secretKey`; otherwise it creates one with `apiKey` literal.
auth:
  existingSecret: ''           # e.g. "locus-agent-secrets"
  secretKey: LOCUS_SERVER_API_KEY
  apiKey: ''                   # only used if existingSecret is empty

# Workload identity — preferred OCI auth path on OKE. The agent picks
# up Instance / Resource Principals from the underlying VM/pod.
serviceAccount:
  create: true
  name: ''                     # auto-derived if empty
  annotations: {}              # add OCI workload identity annotations here

# Container resource requests / limits.
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Liveness + readiness probes hit /health. Tighten startup to allow for
# cold-import time on first boot.
probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
  startup:
    path: /health
    failureThreshold: 30
    periodSeconds: 5

# Service exposure — ClusterIP by default; flip to LoadBalancer or
# NodePort for direct external access.
service:
  type: ClusterIP
  port: 8080

# Optional ingress. Disabled by default; set `enabled: true` to render
# an Ingress with the configured hosts.
ingress:
  enabled: false
  className: ''
  annotations: {}
  hosts:
  - host: locus-agent.example.com
    paths:
    - path: /
      pathType: Prefix
  tls: []

# Horizontal Pod Autoscaler — disabled by default. Enable for
# production workloads with variable traffic.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# OCI bucket checkpointer config — set when the agent uses
# OCIBucketBackend for thread persistence.
ociBucket:
  enabled: false
  bucketName: ''
  namespace: ''
  prefix: locus/threads/

# Free-form environment variables passed to the container.
env: []
  # - name: OCI_PROFILE
  #   value: DEFAULT
  # - name: OTEL_EXPORTER_OTLP_ENDPOINT
  #   value: http://otel-collector.observability.svc:4318

# Pod-level annotations (e.g., for Prometheus scraping or OCI tagging).
podAnnotations: {}

# Node selection / tolerations / affinity.
nodeSelector: {}
tolerations: []
affinity: {}
