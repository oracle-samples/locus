<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"
     shape-rendering="geometricPrecision">
  <!-- Oracle social-avatar style: square with strongly rounded corners,
       white horizontal stadium "O" centred. Corner radius 22% of side,
       inner pill 60% × 30%, stroke 7% of pill height. -->
  <rect width="100" height="100" rx="22" ry="22" fill="#C74634"/>
  <rect x="20" y="36" width="60" height="28" rx="14" ry="14"
        fill="none" stroke="#FFFFFF" stroke-width="6"
        stroke-linejoin="round" stroke-linecap="round"/>
</svg>
