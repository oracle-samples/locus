# GitLab CI for the locus website.
#
# Builds the mkdocs site under ``site/`` and publishes it to orahub
# GitLab Pages. The URL is reported by GitLab on success — for the
# saas-observ-eng/locus project it's
# https://saas-observ-eng.orahub.io/locus/ (orahub's Pages domain).
#
# Pages requires the artifact directory to be named ``public``, so we
# rename ``site -> public`` after the build.

stages:
- test
- pages

variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
  HATCH_CACHE_DIR: $CI_PROJECT_DIR/.cache/hatch

cache:
  key:
    files:
    - pyproject.toml
  paths:
  - .cache/pip
  - .cache/hatch

# ---------------------------------------------------------------------------
# Smoke check: lint + strict mkdocs build on every push, even branches.
# Fails the pipeline if a fabricated link sneaks back in.
# ---------------------------------------------------------------------------
docs:smoke:
  stage: test
  image: python:3.13-slim
  before_script:
  - apt-get update && apt-get install -y --no-install-recommends git
  - python -m pip install --upgrade pip hatch
  script:
  - hatch run docs:build
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH != "main"

# ---------------------------------------------------------------------------
# Pages job: only on main. Builds the site and publishes via the
# ``pages`` artifact convention.
# ---------------------------------------------------------------------------
pages:
  stage: pages
  image: python:3.13-slim
  before_script:
  - apt-get update && apt-get install -y --no-install-recommends git
  - python -m pip install --upgrade pip hatch
  script:
  - hatch run docs:build
  - rm -rf public
  - mv site public
  artifacts:
    paths:
    - public
    expire_in: 30 days
  rules:
  - if: $CI_COMMIT_BRANCH == "main"
