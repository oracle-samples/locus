<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 290"
     font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
     shape-rendering="geometricPrecision">

  <!-- ===== Oracle FY26 palette (theme1.xml of Oracle_PPT-template_FY26) =====
       dk1     #2A2F2F   text
       lt2     #FBF9F8   paper
       accent1 #04536F   deep teal       — Think
       accent3 #C74634   Oracle red      — Execute
       accent5 #89B2B0   sage teal       — Reflect
       accent4 #F0CC71   sand            — Terminate
       accent2 #6C3F49   mauve           — loop-back arrow
  -->

  <defs>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrow-fwd" viewBox="0 0 12 12" refX="11" refY="6"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0,0 L 12,6 L 0,12 z" fill="#2A2F2F"/>
    </marker>

    <marker id="arrow-loop" viewBox="0 0 12 12" refX="11" refY="6"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0,0 L 12,6 L 0,12 z" fill="#6C3F49"/>
    </marker>

    <!-- Star badge — ONLY on the two genuinely-unique innovations
         (Execute idempotent dedup + Terminate algebra). Not on Reflect:
         distinctive packaging, but not novel pattern. -->
    <symbol id="innov" viewBox="0 0 22 22">
      <circle cx="11" cy="11" r="10" fill="#C74634"/>
      <text x="11" y="15.5" text-anchor="middle" font-size="13"
            font-weight="800" fill="#FFFFFF" font-family="Georgia, serif">★</text>
    </symbol>
  </defs>

  <!-- ============ THINK ============ -->
  <g filter="url(#card-shadow)">
    <rect x="20" y="60" width="200" height="110" rx="12" ry="12" fill="#04536F"/>
    <text x="120" y="100" text-anchor="middle" font-size="22" font-weight="800"
          fill="#FFFFFF" letter-spacing="-0.01em">Think</text>
    <text x="120" y="128" text-anchor="middle" font-size="11.5" font-weight="500"
          fill="#FFFFFF" opacity="0.85" letter-spacing="0.06em">THE MODEL DECIDES</text>
    <text x="120" y="146" text-anchor="middle" font-size="11.5" font-weight="500"
          fill="#FFFFFF" opacity="0.75">next action / final answer</text>
  </g>

  <line x1="225" y1="115" x2="265" y2="115" stroke="#2A2F2F"
        stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow-fwd)"/>

  <!-- ============ EXECUTE — innovation ★ ============ -->
  <g filter="url(#card-shadow)">
    <rect x="270" y="60" width="200" height="110" rx="12" ry="12" fill="#C74634"/>
    <text x="370" y="100" text-anchor="middle" font-size="22" font-weight="800"
          fill="#FFFFFF" letter-spacing="-0.01em">Execute</text>
    <text x="370" y="128" text-anchor="middle" font-size="11.5" font-weight="500"
          fill="#FFFFFF" opacity="0.85" letter-spacing="0.06em">IDEMPOTENT DEDUPE</text>
    <text x="370" y="146" text-anchor="middle" font-size="11.5" font-weight="500"
          fill="#FFFFFF" opacity="0.75">retries return the cached receipt</text>
    <use href="#innov" x="455" y="55" width="20" height="20"/>
  </g>

  <line x1="475" y1="115" x2="515" y2="115" stroke="#2A2F2F"
        stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow-fwd)"/>

  <!-- ============ REFLECT — distinctive packaging, NO star ============ -->
  <g filter="url(#card-shadow)">
    <rect x="520" y="60" width="200" height="110" rx="12" ry="12" fill="#89B2B0"/>
    <text x="620" y="100" text-anchor="middle" font-size="22" font-weight="800"
          fill="#1F2828" letter-spacing="-0.01em">Reflect</text>
    <text x="620" y="128" text-anchor="middle" font-size="11.5" font-weight="600"
          fill="#1F2828" opacity="0.85" letter-spacing="0.06em">REFLEXION · CAUSAL</text>
    <text x="620" y="146" text-anchor="middle" font-size="11.5" font-weight="500"
          fill="#1F2828" opacity="0.75">router-integrated graph node</text>
  </g>

  <line x1="725" y1="115" x2="765" y2="115" stroke="#2A2F2F"
        stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow-fwd)"/>

  <!-- ============ TERMINATE? — innovation ★ ============ -->
  <g filter="url(#card-shadow)">
    <rect x="770" y="60" width="190" height="110" rx="12" ry="12" fill="#F0CC71"/>
    <text x="865" y="100" text-anchor="middle" font-size="22" font-weight="800"
          fill="#3A2A0F" letter-spacing="-0.01em">Terminate?</text>
    <text x="865" y="128" text-anchor="middle" font-size="11.5" font-weight="600"
          fill="#3A2A0F" opacity="0.85" letter-spacing="0.06em">ALGEBRA: AND · OR</text>
    <text x="865" y="146" text-anchor="middle" font-size="11.5" font-weight="500"
          fill="#3A2A0F" opacity="0.75">composable stops, just data</text>
    <use href="#innov" x="945" y="55" width="20" height="20"/>
  </g>

  <!-- ============ Loop-back arrow ============ -->
  <path d="M 865 175
           Q 865 240, 480 240
           Q 120 240, 120 175"
        stroke="#6C3F49" stroke-width="2.5" fill="none"
        stroke-dasharray="7,5" stroke-linecap="round"
        marker-end="url(#arrow-loop)"/>
  <text x="480" y="265" text-anchor="middle" font-size="12.5" font-weight="600"
        fill="#6C3F49" font-style="italic" letter-spacing="0.04em">
    another iteration · until the algebra says stop
  </text>

  <!-- Legend strip — be honest about what the star means -->
  <g transform="translate(20, 25)">
    <use href="#innov" x="0" y="0" width="16" height="16"/>
    <text x="22" y="13" font-size="11" font-weight="500" fill="#2A2F2F"
          letter-spacing="0.04em">PRIMITIVES UNIQUE TO LOCUS · NO COMPETITOR SHIPS THESE</text>
  </g>
</svg>
