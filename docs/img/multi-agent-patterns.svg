<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760"
     font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
     shape-rendering="geometricPrecision">

  <!-- Oracle FY26 palette
       accent1 #04536F  deep teal     accent3 #C74634  Oracle red
       accent5 #89B2B0  sage teal     accent4 #F0CC71  sand
       accent2 #6C3F49  mauve         dk1     #2A2F2F  text -->

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 12 12" refX="11" refY="6"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0,0 L 12,6 L 0,12 z" fill="#2A2F2F"/>
    </marker>
    <marker id="arr-mauve" viewBox="0 0 12 12" refX="11" refY="6"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0,0 L 12,6 L 0,12 z" fill="#6C3F49"/>
    </marker>
  </defs>

  <!-- =============== TILE 1 — COMPOSITION (top-left) =============== -->
  <g transform="translate(0, 0)">
    <text x="20" y="30" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">Composition</text>
    <text x="20" y="48" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">SequentialPipeline · ParallelPipeline · LoopAgent</text>
    <g filter="url(#shadow)">
      <rect x="20"  y="65" width="80" height="60" rx="8" fill="#04536F"/>
      <text x="60" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">A</text>
      <rect x="140" y="65" width="80" height="60" rx="8" fill="#04536F"/>
      <text x="180" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">B</text>
      <rect x="260" y="65" width="80" height="60" rx="8" fill="#04536F"/>
      <text x="300" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">C</text>
    </g>
    <line x1="105" y1="95" x2="135" y2="95" stroke="#2A2F2F" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="225" y1="95" x2="255" y2="95" stroke="#2A2F2F" stroke-width="2" marker-end="url(#arr)"/>
    <text x="20" y="150" font-size="11" fill="#2A2F2F" font-style="italic">linear chain · output of one feeds the next</text>
  </g>

  <!-- =============== TILE 2 — ORCHESTRATOR (top-right) =============== -->
  <g transform="translate(480, 0)">
    <text x="20" y="30" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">Orchestrator + Specialists</text>
    <text x="20" y="48" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">one router · parallel experts</text>
    <g filter="url(#shadow)">
      <rect x="160" y="60" width="120" height="40" rx="8" fill="#C74634"/>
      <text x="220" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Coordinator</text>
      <rect x="20"  y="125" width="100" height="40" rx="8" fill="#04536F"/>
      <text x="70"  y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Specialist 1</text>
      <rect x="170" y="125" width="100" height="40" rx="8" fill="#04536F"/>
      <text x="220" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Specialist 2</text>
      <rect x="320" y="125" width="100" height="40" rx="8" fill="#04536F"/>
      <text x="370" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Specialist 3</text>
    </g>
    <line x1="220" y1="103" x2="70"  y2="123" stroke="#2A2F2F" stroke-width="1.6" marker-end="url(#arr)"/>
    <line x1="220" y1="103" x2="220" y2="123" stroke="#2A2F2F" stroke-width="1.6" marker-end="url(#arr)"/>
    <line x1="220" y1="103" x2="370" y2="123" stroke="#2A2F2F" stroke-width="1.6" marker-end="url(#arr)"/>
    <line x1="70"  y1="167" x2="220" y2="190" stroke="#6C3F49" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arr-mauve)"/>
    <line x1="220" y1="167" x2="220" y2="190" stroke="#6C3F49" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arr-mauve)"/>
    <line x1="370" y1="167" x2="220" y2="190" stroke="#6C3F49" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arr-mauve)"/>
    <text x="20" y="215" font-size="11" fill="#2A2F2F" font-style="italic">coordinator delegates · specialists run in parallel · results merge back</text>
  </g>

  <!-- =============== TILE 3 — SWARM (row 2 left) =============== -->
  <g transform="translate(0, 240)">
    <text x="20" y="30" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">Swarm</text>
    <text x="20" y="48" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">peer-to-peer · shared context</text>
    <g filter="url(#shadow)">
      <rect x="135" y="65" width="100" height="35" rx="8" fill="#F0CC71"/>
      <text x="185" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#3A2A0F">SharedContext</text>
      <rect x="20"  y="125" width="80" height="40" rx="8" fill="#89B2B0"/>
      <text x="60"  y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2828">Agent 1</text>
      <rect x="140" y="125" width="80" height="40" rx="8" fill="#89B2B0"/>
      <text x="180" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2828">Agent 2</text>
      <rect x="260" y="125" width="80" height="40" rx="8" fill="#89B2B0"/>
      <text x="300" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2828">Agent 3</text>
    </g>
    <line x1="60"  y1="125" x2="160" y2="103" stroke="#2A2F2F" stroke-width="1.4" stroke-dasharray="4,3"/>
    <line x1="180" y1="125" x2="185" y2="103" stroke="#2A2F2F" stroke-width="1.4" stroke-dasharray="4,3"/>
    <line x1="300" y1="125" x2="210" y2="103" stroke="#2A2F2F" stroke-width="1.4" stroke-dasharray="4,3"/>
    <text x="20" y="190" font-size="11" fill="#2A2F2F" font-style="italic">no central router · agents pull from a shared queue</text>
  </g>

  <!-- =============== TILE 4 — HANDOFF (row 2 right) =============== -->
  <g transform="translate(480, 240)">
    <text x="20" y="30" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">Handoff</text>
    <text x="20" y="48" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">conversation transfers with full history</text>
    <g filter="url(#shadow)">
      <rect x="20"  y="80" width="120" height="50" rx="8" fill="#04536F"/>
      <text x="80" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Triage agent</text>
      <text x="80" y="120" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">"this is billing"</text>
      <rect x="280" y="80" width="120" height="50" rx="8" fill="#04536F"/>
      <text x="340" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Billing agent</text>
      <text x="340" y="120" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">picks up the thread</text>
    </g>
    <path d="M 145 105 L 275 105" stroke="#C74634" stroke-width="2.5" marker-end="url(#arr)"/>
    <text x="155" y="98" font-size="10" font-weight="600" fill="#C74634">full transcript →</text>
    <text x="20" y="160" font-size="11" fill="#2A2F2F" font-style="italic">role transfer · the customer doesn't have to re-explain</text>
  </g>

  <!-- =============== TILE 5 — STATEGRAPH (row 3 left) =============== -->
  <g transform="translate(0, 460)">
    <text x="20" y="30" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">StateGraph</text>
    <text x="20" y="48" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">DAG with cycles · conditional edges · subgraphs</text>
    <g filter="url(#shadow)">
      <rect x="20"  y="80" width="80" height="40" rx="8" fill="#89B2B0"/>
      <text x="60"  y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2828">Plan</text>
      <rect x="150" y="80" width="80" height="40" rx="8" fill="#89B2B0"/>
      <text x="190" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2828">Research</text>
      <rect x="280" y="80" width="80" height="40" rx="8" fill="#89B2B0"/>
      <text x="320" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2828">Review</text>
    </g>
    <line x1="105" y1="100" x2="145" y2="100" stroke="#2A2F2F" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="235" y1="100" x2="275" y2="100" stroke="#2A2F2F" stroke-width="2" marker-end="url(#arr)"/>
    <path d="M 320 125 Q 320 165, 190 165 Q 60 165, 60 125"
          stroke="#6C3F49" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-mauve)"/>
    <text x="170" y="180" font-size="10" font-weight="600" fill="#6C3F49" font-style="italic">if confidence &lt; 0.8</text>
    <text x="20" y="210" font-size="11" fill="#2A2F2F" font-style="italic">explicit nodes + edges · loop until a condition holds</text>
  </g>

  <!-- =============== TILE 6 — FUNCTIONAL (row 3 right) =============== -->
  <g transform="translate(480, 460)">
    <text x="20" y="30" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">Functional API</text>
    <text x="20" y="48" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">@task · @entrypoint · asyncio.gather</text>
    <g filter="url(#shadow)">
      <rect x="180" y="65" width="80" height="35" rx="8" fill="#C74634"/>
      <text x="220" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">@entrypoint</text>
      <rect x="20"  y="125" width="80" height="35" rx="8" fill="#04536F"/>
      <text x="60"  y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">@task A</text>
      <rect x="120" y="125" width="80" height="35" rx="8" fill="#04536F"/>
      <text x="160" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">@task B</text>
      <rect x="220" y="125" width="80" height="35" rx="8" fill="#04536F"/>
      <text x="260" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">@task C</text>
      <rect x="320" y="125" width="80" height="35" rx="8" fill="#04536F"/>
      <text x="360" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">@task D</text>
    </g>
    <line x1="220" y1="103" x2="60"  y2="123" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>
    <line x1="220" y1="103" x2="160" y2="123" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>
    <line x1="220" y1="103" x2="260" y2="123" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>
    <line x1="220" y1="103" x2="360" y2="123" stroke="#2A2F2F" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="20" y="190" font-size="11" fill="#2A2F2F" font-style="italic">map/reduce · whatever asyncio supports</text>
  </g>

  <!-- =============== TILE 7 — A2A (full-width bottom) =============== -->
  <g transform="translate(0, 660)">
    <text x="20" y="20" font-size="14" font-weight="800" fill="#2A2F2F" letter-spacing="-0.01em">A2A — across processes</text>
    <text x="20" y="38" font-size="11" font-weight="500" fill="#6C3F49" letter-spacing="0.04em">cross-runtime · capability-based discovery · HTTP+SSE</text>
    <g filter="url(#shadow)">
      <rect x="20"  y="55" width="220" height="60" rx="10" fill="#FBF9F8" stroke="#C74634" stroke-width="2"/>
      <text x="35"  y="73" font-size="10" font-weight="600" fill="#6C3F49">team-a · process-1</text>
      <rect x="40"  y="80" width="80" height="28" rx="6" fill="#04536F"/>
      <text x="80"  y="98" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">research</text>
      <rect x="135" y="80" width="80" height="28" rx="6" fill="#04536F"/>
      <text x="175" y="98" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">summary</text>

      <rect x="700" y="55" width="220" height="60" rx="10" fill="#FBF9F8" stroke="#C74634" stroke-width="2"/>
      <text x="715" y="73" font-size="10" font-weight="600" fill="#6C3F49">team-b · process-2</text>
      <rect x="720" y="80" width="80" height="28" rx="6" fill="#89B2B0"/>
      <text x="760" y="98" text-anchor="middle" font-size="10" font-weight="700" fill="#1F2828">finance</text>
      <rect x="815" y="80" width="80" height="28" rx="6" fill="#89B2B0"/>
      <text x="855" y="98" text-anchor="middle" font-size="10" font-weight="700" fill="#1F2828">audit</text>
    </g>
    <path d="M 245 95 Q 480 50, 695 95"
          stroke="#C74634" stroke-width="2.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arr)"/>
    <text x="430" y="50" font-size="11" font-weight="700" fill="#C74634" letter-spacing="0.06em">A2A · HTTP + SSE</text>
  </g>
</svg>
