<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Helvetica, sans-serif">
  <!-- Mark — concentric squares converging on a centre dot. Locus = a place / centre. -->
  <g transform="translate(20, 20)">
    <rect x="20" y="20" width="60" height="60" rx="4" fill="none" stroke="#312D2A" stroke-width="3" transform="rotate(45 50 50)"/>
    <rect x="28" y="28" width="44" height="44" rx="3" fill="none" stroke="#C74634" stroke-width="3" transform="rotate(22.5 50 50)"/>
    <rect x="38" y="38" width="24" height="24" rx="2" fill="#C74634"/>
    <circle cx="50" cy="50" r="4" fill="#FAFAF9"/>
  </g>

  <!-- Wordmark -->
  <text x="135" y="84" font-size="52" font-weight="700" fill="#312D2A" letter-spacing="-0.04em">locus</text>

  <!-- Tagline -->
  <text x="138" y="110" font-size="11" font-weight="500" fill="#78716C" letter-spacing="0.16em">ORACLE GENERATIVE AI · MULTI-AGENT ORCHESTRATOR SDK</text>
</svg>
